name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxkbcommon-dev libgl1-mesa-dev clang cmake

      - uses: dtolnay/rust-toolchain@stable

      - name: Build and test
        run: |
          cargo test --locked
          cargo build --release --locked

      - name: Create archive
        run: |
          mkdir -p dist/cloudreve-sync
          cp target/release/cloudreve-sync README.md LICENSE logo-sync.png dist/cloudreve-sync/
          cp -r assets dist/cloudreve-sync/
          tar -C dist -czf "dist/cloudreve-sync-${GITHUB_REF_NAME}-x86_64-linux.tar.gz" cloudreve-sync

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cloudreve-sync-${{ github.ref_name }}-x86_64-linux.tar.gz
            PKGBUILD
            flake.nix
            package.nix
